name: Ubuntu Image Builder

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ubuntu_soc:
        description: "Select device board."
        required: false
        default: "all"
        type: choice
        options:
          - all
          - e20c
          - e54c
          - h28k
          - h29k
          - h66k
          - h68k
          - h69k-max
          - h69k
          - h88k
          - ht2
          - ht3
          - netfusion
          - rock-5b
          - yixun-rs6pro
          - zcube1-max
      kernel_repo:
        description: "Set the kernel repository"
        required: false
        default: "ophub/kernel"
        type: choice
        options:
          - breakingbadboy/OpenWrt
          - ophub/kernel
      ubuntu_storage:
        description: "Select image storage type."
        required: false
        default: "save"
        type: choice
        options:
          - save
          - temp
      builder_name:
        description: "Set Ubuntu builder signature."
        required: false
        default: "flippy"
        type: choice
        options:
          - flippy
          - angel
          - yourname

env:
  TZ: Etc/UTC

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    if: ${{ github.event.repository.owner.id }} == ${{ github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialization environment
        id: init
        env:
            DEBIAN_FRONTEND: noninteractive
        run: |
            docker rmi -f $(docker images -q) 2>/dev/null || true
            [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
            sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
            sudo swapoff -a
            sudo rm -f /swapfile /mnt/swapfile
            sudo -E apt-get -y update
            sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
            sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-build-armbian-depends)
            sudo -E systemctl daemon-reload
            #sudo -E apt-get -y full-upgrade
            sudo -E apt-get -y autoremove --purge
            sudo -E apt-get clean
            sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
            sudo rm -rf ~/{.cargo,.dotnet,.rustup}
            sudo -E timedatectl set-timezone "${TZ:-Etc/UTC}"
            sudo -E ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
            sudo -E timedatectl set-ntp true
            date -u
            timedatectl status || true
            echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create simulated physical disk
        id: disk
        run: |
            mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
            root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
            sudo truncate -s "${mnt_size}"G /mnt/mnt.img
            sudo truncate -s "${root_size}"G /root.img
            sudo losetup /dev/loop6 /mnt/mnt.img
            sudo losetup /dev/loop7 /root.img
            sudo pvcreate /dev/loop6
            sudo pvcreate /dev/loop7
            sudo vgcreate github /dev/loop6 /dev/loop7
            sudo lvcreate -n runner -l 100%FREE github
            sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
            sudo mkdir -p /builder
            sudo mount /dev/github/runner /builder
            sudo chown -R runner:runner /builder
            df -Th
            echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Make Ubuntu RootFS
        id: download
        working-directory: /builder
        run: |
            # Setup builder directories
            sudo mkdir -p /builder/{opt,output}
            sudo rm -rf /opt && sudo ln -sf /builder/opt /opt
            sudo ln -sf /builder/output ${{ github.workspace }}/output

            # Download and build Ubuntu rootfs
            git clone -q --single-branch --depth=1 --branch=main https://github.com/unifreq/rk-ubuntu-build rk-ubuntu-build
            cd rk-ubuntu-build
            sudo ./mkrootfs.sh noble-rk-media
            ls -alh .
            sudo tar -czf ../output/noble-rk-media-rootfs.tar.gz -C build/noble-rk-media .

            #
            echo "build_tag=ubuntu_$(date +"%Y.%m")" >> ${GITHUB_ENV}
            echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Upload Ubuntu to Release
        uses: ncipollo/release-action@main
        if: ${{ env.PACKAGED_STATUS }} == 'success' && !cancelled()
        with:
            tag: ${{ env.build_tag }}
            artifacts: output/*
            allowUpdates: true
            removeArtifacts: false
            replacesArtifacts: true
            makeLatest: true
            token: ${{ secrets.GITHUB_TOKEN }}
            body: |
                ### Ubuntu Image information
                - Default username: root
                - Default password: password

      - name: Make Ubuntu Image
        id: image
        working-directory: /builder
        run: |
            cd rk-ubuntu-build
            sed -i 's/^export kernel_version=.*/export kernel_version=5.10.160-rk35xx-flippy-2309a/' env/soc/rk3528.env
            sudo ./mkimg.sh rk3528 h28k noble-rk-media boot256-ext4root
            ls -alh .
            cd build
            sudo pigz -qf *.img && sudo mv *.img.gz ../../output/
            echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Upload Ubuntu to Release
        uses: ncipollo/release-action@main
        if: ${{ env.PACKAGED_STATUS }} == 'success' && !cancelled()
        with:
            tag: ${{ env.build_tag }}
            artifacts: output/*
            allowUpdates: true
            removeArtifacts: false
            replacesArtifacts: true
            makeLatest: true
            token: ${{ secrets.GITHUB_TOKEN }}
            body: |
                ### Ubuntu Image information
                - Default username: root
                - Default password: password

